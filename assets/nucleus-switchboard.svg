<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Nucleuskit command switchboard</title>
  <desc id="desc">Animated command switchboard showing contract, generation, verification, and runtime modules.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#15121f"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2afadf"/>
      <stop offset="0.5" stop-color="#f8d66d"/>
      <stop offset="1" stop-color="#ff6b9a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#2afadf" opacity="0.14"/>
    </pattern>
    <clipPath id="panelClip">
      <rect x="14" y="10" width="1172" height="260" rx="22"/>
    </clipPath>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
      .scan { animation: scan 4.5s ease-in-out infinite; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; }
      .delay1 { animation-delay: .35s; }
      .delay2 { animation-delay: .7s; }
      .delay3 { animation-delay: 1.05s; }
      .cursor { animation: blink 1s steps(2, start) infinite; }
      @keyframes scan {
        0%, 100% { transform: translateX(-220px); opacity: 0; }
        15%, 75% { opacity: 1; }
        92% { transform: translateX(1010px); opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .68; }
        50% { opacity: 1; }
      }
      @keyframes blink { 50% { opacity: .18; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>
  <rect x="14" y="10" width="1172" height="260" rx="22" fill="url(#panel)"/>
  <g clip-path="url(#panelClip)">
  <rect x="14" y="10" width="1172" height="260" rx="22" fill="url(#dots)"/>
  <rect x="48" y="48" width="280" height="2" fill="url(#rail)" opacity=".8" class="scan"/>
  <g class="mono" transform="translate(68 54)">
    <circle cx="0" cy="0" r="5" fill="#ff6b9a"/>
    <circle cx="18" cy="0" r="5" fill="#f8d66d"/>
    <circle cx="36" cy="0" r="5" fill="#2afadf"/>
    <text x="0" y="42" fill="#8b949e" font-size="15">$ nucleus plan --contract service.yaml</text>
    <rect x="350" y="27" width="9" height="18" fill="#2afadf" class="cursor"/>
  </g>
  <g transform="translate(84 132)">
    <g class="pulse">
      <rect width="300" height="72" rx="14" fill="#0b141c" stroke="#2afadf" stroke-opacity=".55"/>
      <text class="mono" x="26" y="31" fill="#2afadf" font-size="15" font-weight="800">CONTRACT</text>
      <text class="mono" x="26" y="54" fill="#c9d1d9" font-size="13">intent before wiring</text>
    </g>
    <g class="pulse delay1" transform="translate(390 0)">
      <rect width="300" height="72" rx="14" fill="#151407" stroke="#f8d66d" stroke-opacity=".58"/>
      <text class="mono" x="26" y="31" fill="#f8d66d" font-size="15" font-weight="800">GENERATE</text>
      <text class="mono" x="26" y="54" fill="#c9d1d9" font-size="13">predictable surfaces</text>
    </g>
    <g class="pulse delay2" transform="translate(780 0)">
      <rect width="300" height="72" rx="14" fill="#190f18" stroke="#ff6b9a" stroke-opacity=".6"/>
      <text class="mono" x="26" y="31" fill="#ff6b9a" font-size="15" font-weight="800">VERIFY + RUN</text>
      <text class="mono" x="26" y="54" fill="#c9d1d9" font-size="13">http | grpc | worker</text>
    </g>
  </g>
  <g fill="none" stroke="url(#rail)" stroke-width="2" opacity=".52" filter="url(#glow)">
    <path d="M384 168 H474"/>
    <path d="M774 168 H864"/>
  </g>
  <g class="mono" transform="translate(68 236)">
    <text fill="#2afadf" font-size="13">status:</text>
    <text x="62" fill="#c9d1d9" font-size="13">small kernel online</text>
    <text x="302" fill="#f8d66d" font-size="13">contracts armed</text>
    <text x="540" fill="#ff6b9a" font-size="13">verification watching</text>
  </g>
  </g>
</svg>
